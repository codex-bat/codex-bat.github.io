<!doctype html>
<html lang="en">

<head>
  <!-- Discord, most platforms -->
  <meta property="og:title" content="Codex.bat">
  <meta property="og:description" content="Codex.bat's Minecraft modding community!">
  <meta property="og:image" content="https://codex-bat.github.io/assets/logo.png">
  <meta property="og:url" content="https://codex-bat.github.io/discord">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Codex.bat">
  <meta name="twitter:description" content="Codex.bat's Minecraft modding community!">
  <meta name="twitter:image" content="https://codex-bat.github.io/assets/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/logo.png">
  <link rel="icon" type="image/png" href="/assets/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="shortcut icon" href="/assets/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <link rel="manifest" href="/assets/site.webmanifest" />
  <title>Join my Discord</title>

  <!-- instant redirect -->
  <meta http-equiv="refresh" content="0; url=https://discord.gg/9EBsDhJDUN" />

  <style>
    :root {
      --bg: #0a0b10;
      --panel: #11141c;
      --text: #e7e7ea;
      --muted: #9aa0ad;
      --line: #232735;
      --accent: #6c7cff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(108, 124, 255, 0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.05), transparent 28%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      background: rgba(17, 20, 28, 0.92);
      border: 1px solid var(--line);
      padding: 28px;
      max-width: 420px;
      width: 100%;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    a {
      display: inline-block;
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: #151924;
      color: var(--text);
      text-decoration: none;
    }

    a:hover {
      border-color: var(--accent);
      background: #1a1f2c;
    }
  </style>

  <script>
    // backup redirect (faster + works if meta refresh is blocked --- I think!?!??)
    window.location.replace("https://discord.gg/9EBsDhJDUN");
  </script>
</head>

<body>
  <div class="card">
    <h1>Joining Discord...</h1>
    <p>If nothing happens, click below.</p>
    <a href="https://discord.gg/9EBsDhJDUN">Continue</a>
  </div>
</body>

</html>

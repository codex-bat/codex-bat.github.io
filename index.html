/* ===== EYE COMPONENT – sharper almond shape, cooler tint ===== */
.magic-eye {
  position: fixed;
  bottom: 28px;
  left: 50%;
  width: 60px;
  height: 46px;
  transform: translateX(-50%);
  z-index: 9999;
  pointer-events: none;
  cursor: default;
  overflow: hidden;

  /* pointed left/right edges */
  clip-path: polygon(
    0% 50%,
    7% 28%,
    22% 12%,
    50% 4%,
    78% 12%,
    93% 28%,
    100% 50%,
    93% 72%,
    78% 88%,
    50% 96%,
    22% 88%,
    7% 72%
  );

  background:
    radial-gradient(circle at 35% 38%, rgba(255,255,255,0.16), rgba(255,255,255,0) 26%),
    linear-gradient(145deg, #172131 0%, #0b0f16 72%);
  border: 1px solid #2a3550;
  box-shadow:
    0 0 0 2px rgba(10, 12, 18, 0.95),
    0 0 0 5px rgba(0, 0, 0, 0.35),
    0 8px 20px rgba(0, 0, 0, 0.55),
    inset 0 0 12px rgba(127, 158, 255, 0.10),
    inset 0 -8px 18px rgba(0, 0, 0, 0.45);

  transition: box-shadow 0.2s ease, transform 0.05s ease;
  animation: eyePulse 5s ease-in-out infinite alternate;
}

@keyframes eyePulse {
  0% {
    box-shadow:
      0 0 0 2px rgba(10, 12, 18, 0.95),
      0 0 0 5px rgba(0, 0, 0, 0.35),
      0 8px 20px rgba(0, 0, 0, 0.55),
      inset 0 0 10px rgba(127, 158, 255, 0.08),
      inset 0 -8px 18px rgba(0, 0, 0, 0.45);
  }
  100% {
    box-shadow:
      0 0 0 2px rgba(10, 12, 18, 0.95),
      0 0 0 5px rgba(0, 0, 0, 0.35),
      0 8px 24px rgba(0, 0, 0, 0.68),
      inset 0 0 16px rgba(127, 158, 255, 0.14),
      inset 0 -8px 18px rgba(0, 0, 0, 0.5);
  }
}

/* subtle highlights */
.magic-eye::before {
  content: "";
  position: absolute;
  top: 10px;
  left: 11px;
  width: 13px;
  height: 13px;
  background: rgba(225, 233, 255, 0.18);
  border-radius: 50%;
  filter: blur(1px);
  pointer-events: none;
  z-index: 2;
}

.magic-eye::after {
  content: "";
  position: absolute;
  bottom: 9px;
  right: 13px;
  width: 7px;
  height: 7px;
  background: rgba(210, 220, 255, 0.14);
  border-radius: 50%;
  filter: blur(0.5px);
  pointer-events: none;
  z-index: 2;
}

/* pupil */
.eye-pupil {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 18px;
  height: 18px;
  background: radial-gradient(circle at 35% 35%, #11182a, #020308 72%);
  border-radius: 50%;
  box-shadow:
    0 0 4px rgba(0, 0, 0, 0.8),
    inset 0 0 2px rgba(127, 158, 255, 0.15);
  transform: translate(-50%, -50%);
  will-change: transform;
  pointer-events: none;
  transition: transform 0.08s linear;
  z-index: 3;
}

/* cool glint instead of red */
.eye-pupil::after {
  content: "";
  position: absolute;
  top: 4px;
  left: 5px;
  width: 5px;
  height: 5px;
  background: rgba(185, 200, 255, 0.72);
  border-radius: 50%;
  opacity: 0.65;
  filter: blur(0.5px);
  pointer-events: none;
}

/* blink: eyelid-style instead of squashing the whole eye */
.magic-eye.blink {
  animation: eyeBlink 150ms cubic-bezier(0.4, 0, 0.2, 1) both;
}

@keyframes eyeBlink {
  0% {
    clip-path: polygon(
      0% 50%,
      7% 28%,
      22% 12%,
      50% 4%,
      78% 12%,
      93% 28%,
      100% 50%,
      93% 72%,
      78% 88%,
      50% 96%,
      22% 88%,
      7% 72%
    );
    transform: translateX(-50%) translateY(0);
  }
  45%,
  55% {
    clip-path: polygon(
      0% 50%,
      10% 47%,
      92% 47%,
      100% 50%,
      92% 53%,
      10% 53%
    );
    transform: translateX(-50%) translateY(1px);
  }
  100% {
    clip-path: polygon(
      0% 50%,
      7% 28%,
      22% 12%,

}

<!-- THE EYE (human-like + eerie) + speech bubble container -->
<div class="magic-eye" id="magicEye" aria-hidden="true">
  <div class="eye-pupil" id="eyePupil"></div>
</div>
<div class="eye-speech" id="eyeSpeech"></div>

<script>
  (function() {
    // ======================== CUSTOMIZABLE PHRASE ARRAY ========================
    // ✨ Add / remove / modify any phrases you like – the eye will speak them randomly
    const PHRASE_LIST = [
      "👁️ I see you...",
      "psst... click something",
      "you're still here?",
      "the void stares back",
      "shh, it's listening",
      "welcome, wanderer",
      "need a secret?",
      "don't blink...",
      "so dark in here",
      "👁️‍🗨️ follow me",
      "time is thin here",
      "what do you seek?",
      "⚡ eerie vibes",
      "...or am I dreaming?",
      "beware the silence"
    ];
    
    // ======================== INTERVAL CONTROLS (seconds) ========================
    const BLINK_INTERVAL_SEC = 4;      // min 3, max 8 (randomized)
    const SPEAK_INTERVAL_SEC = 12;     // random between 10 and 25 seconds
    
    // Speech bubble duration (how long text stays visible)
    const SPEECH_DURATION_MS = 3800;
    
    // ---------- DOM elements ----------
    const eye = document.getElementById('magicEye');
    const pupil = document.getElementById('eyePupil');
    const speechBubble = document.getElementById('eyeSpeech');
    
    // guard: if JS disabled, no errors, everything static (eye still looks cool)
    if (!eye || !pupil) return;
    
    // ---------- Elliptical pupil movement (accurate for almond eye) ----------
    let eyeRect = { left: 0, top: 0, width: 0, height: 0, centerX: 0, centerY: 0 };
    let aRadius = 0;   // horizontal half-axis (max offset X) = (eyeWidth/2 - pupilRadius)
    let bRadius = 0;   // vertical half-axis (max offset Y)
    let pupilRadius = 0;
    let lastMouseX = null, lastMouseY = null;
    
    // update eye metrics and ellipse limits
    function updateEyeMetrics() {
      if (!eye || !pupil) return;
      const rect = eye.getBoundingClientRect();
      eyeRect.left = rect.left;
      eyeRect.top = rect.top;
      eyeRect.width = rect.width;
      eyeRect.height = rect.height;
      eyeRect.centerX = rect.left + rect.width / 2;
      eyeRect.centerY = rect.top + rect.height / 2;
      
      const pupilRect = pupil.getBoundingClientRect();
      pupilRadius = pupilRect.width / 2;
      
      // ellipse axes: max allowed offset from center to keep pupil inside visible sclera
      aRadius = Math.max(0, (eyeRect.width / 2) - pupilRadius);
      bRadius = Math.max(0, (eyeRect.height / 2) - pupilRadius);
    }
    
    // reset pupil to exact center
    function resetPupilCenter() {
      if (pupil) pupil.style.transform = 'translate(-50%, -50%)';
    }
    
    // move pupil with ellipse constraint (realistic for almond shape)
    function movePupilTo(mouseX, mouseY) {
      if (!pupil || aRadius <= 0 || bRadius <= 0) return;
      
      let dx = mouseX - eyeRect.centerX;
      let dy = mouseY - eyeRect.centerY;
      
      // ellipse equation: (dx^2)/(a^2) + (dy^2)/(b^2) <= 1
      const normX = dx / aRadius;
      const normY = dy / bRadius;
      const distanceSq = normX * normX + normY * normY;
      
      if (distanceSq > 1.0 && distanceSq > 0.01) {
        // scale vector to the ellipse boundary
        const scale = 1 / Math.sqrt(distanceSq);
        dx = dx * scale;
        dy = dy * scale;
      }
      
      // apply transform: keep centered with pixel offset
      pupil.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }
    
    // --- pointer/touch handlers ---
    function handlePointerMove(clientX, clientY) {
      if (!eye) return;
      lastMouseX = clientX;
      lastMouseY = clientY;
      if (aRadius > 0 && bRadius > 0) {
        movePupilTo(clientX, clientY);
      }
    }
    
    function onMouseMove(e) {
      handlePointerMove(e.clientX, e.clientY);
    }
    
    function onTouchMove(e) {
      if (e.touches.length) {
        const touch = e.touches[0];
        handlePointerMove(touch.clientX, touch.clientY);
      }
    }
    
    function onTouchEnd() {
      resetPupilCenter();
      lastMouseX = lastMouseY = null;
    }
    
    function onMouseLeaveWindow(e) {
      if (e.clientY <= 0 || e.clientX <= 0 || e.clientX >= window.innerWidth || e.clientY >= window.innerHeight) {
        resetPupilCenter();
        lastMouseX = lastMouseY = null;
      }
    }
    
    // ---------- BLINK: adds .blink class then removes it ----------
    function blink() {
  if (!eye) return;
  eye.classList.add('blink');
  setTimeout(() => {
    eye.classList.remove('blink');
  }, 150);
}
    
    // ---------- SPEECH: random phrase from array, show bubble ----------
    let currentSpeechTimeout = null;
    function speakRandom() {
      if (!speechBubble) return;
      // pick random phrase
      const randomIndex = Math.floor(Math.random() * PHRASE_LIST.length);
      const phrase = PHRASE_LIST[randomIndex];
      speechBubble.textContent = phrase;
      speechBubble.classList.add('show');
      
      // clear any previous hiding timeout
      if (currentSpeechTimeout) clearTimeout(currentSpeechTimeout);
      currentSpeechTimeout = setTimeout(() => {
        speechBubble.classList.remove('show');
        currentSpeechTimeout = null;
      }, SPEECH_DURATION_MS);
    }
    
    // ---------- RANDOM TIMERS (blink & speak with natural variation) ----------
    let blinkTimer = null;
    let speakTimer = null;
    
    function scheduleBlink() {
      if (blinkTimer) clearTimeout(blinkTimer);
      const delayMs = (BLINK_INTERVAL_SEC + Math.random() * 4) * 1000;  // between 4s and 8s
      blinkTimer = setTimeout(() => {
        blink();
        scheduleBlink();   // re-schedule after blink
      }, delayMs);
    }
    
    function scheduleSpeak() {
      if (speakTimer) clearTimeout(speakTimer);
      const delayMs = (SPEAK_INTERVAL_SEC + Math.random() * 13) * 1000; // 12–25 sec range
      speakTimer = setTimeout(() => {
        speakRandom();
        scheduleSpeak();
      }, delayMs);
    }
    
    // ---------- resize & orientation: re-measure ellipse + reapply mouse if needed ----------
    function handleResize() {
      updateEyeMetrics();
      resetPupilCenter();
      if (lastMouseX !== null && lastMouseY !== null) {
        if (lastMouseX >= 0 && lastMouseX <= window.innerWidth && lastMouseY >= 0 && lastMouseY <= window.innerHeight) {
          movePupilTo(lastMouseX, lastMouseY);
        } else {
          lastMouseX = lastMouseY = null;
        }
      }
    }
    
    // ---------- INIT everything ----------
    function initInteractiveEye() {
      updateEyeMetrics();
      resetPupilCenter();
      
      // event listeners
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseleave', onMouseLeaveWindow);
      window.addEventListener('touchmove', onTouchMove, { passive: true });
      window.addEventListener('touchend', onTouchEnd);
      window.addEventListener('touchcancel', onTouchEnd);
      window.addEventListener('resize', handleResize);
      window.addEventListener('orientationchange', handleResize);
      window.addEventListener('scroll', () => {
        if (eye) {
          updateEyeMetrics();
          if (lastMouseX !== null && lastMouseY !== null) movePupilTo(lastMouseX, lastMouseY);
        }
      }, { passive: true });
      
      // start random behaviors
      scheduleBlink();
      scheduleSpeak();
    }
    
    // start when DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initInteractiveEye);
    } else {
      initInteractiveEye();
    }
  })();
</script>

<!-- 
  🧿 (I remmeber you, yuri) EYE BEHAVIOR SUMMARY:
  - The eye is always visible (center-bottom of every page).
  - If JavaScript is disabled: the eye stays still with a centered pupil → no movement, 
    but everything works, looks fine, and no errors appear.
  - If JavaScript is enabled: the pupil smoothly follows mouse (or finger on touch devices)
    while staying strictly inside the eyeball. 
  - Pointer-events: none ensures the eye never blocks any link, button, or text selection.
  - This snippet is self-contained: add the .magic-eye and .eye-pupil HTML + CSS + script
    to any page of the site, and it will persist across the whole website with the same 
    charming tracking behaviour.

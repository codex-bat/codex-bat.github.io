    body {
      background: #000;
      color: #ddd;
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 2rem;
      line-height: 1.5;
    }
    .container {
      max-width: 800px;

    }
    header {
      border-bottom: 2px solid #2a2a2a;

      padding-bottom: 1rem;

      text-decoration: underline;
    }
    .post-list {
      list-style: none;
      padding: 0;

    }
    .post-date {
      color: #888;
      font-size: 0.8rem;
    }
    .post-title {
      font-size: 1.4rem;
      margin: 0.5rem 0;
    }
    .post-title a {
      color: #7f9eff;
      text-decoration: none;
    }
    .post-title a:hover {
      text-decoration: underline;
    }
    .empty {
      text-align: center;
      color: #888;
      padding: 2rem;
      border: 1px dashed #2a2a2a;
    }
    footer {
      margin-top: 2rem;
      text-align: center;

  <h2>posts</h2>
  <div id="posts-container">

      <li>
        <div class="post-date">March 21, 2026</div>

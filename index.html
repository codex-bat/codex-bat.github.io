  <style>
    /* ===== base styles (unchanged) ===== */
    body {
      background: #000;

    /* ===== EYE COMPONENT – smoother shape + cleaner blink ===== */
    .magic-eye {
      position: fixed;
      bottom: 28px;
      left: 50%;
      width: 44px;
      height: 34px;
      transform: translateX(-50%) scale(var(--eye-squish, 1)) scaleY(var(--eye-blink, 1));
      transform-origin: center center;

      /* smoother almond shape */
      clip-path: polygon(0% 50%,
          4% 39%,
          10% 29%,
          18% 20%,
          28% 14%,
          39% 10%,
          50% 8%,
          61% 10%,
          72% 14%,
          82% 20%,
          90% 29%,
          96% 39%,
          100% 50%,
          96% 61%,
          90% 71%,
          82% 80%,
          72% 86%,
          61% 90%,
          50% 92%,
          39% 90%,
          28% 86%,
          18% 80%,
          10% 71%,
          4% 61%);

      background: radial-gradient(ellipse at 35% 40%,
          #fbf8f1 0%,
          #f3eee4 52%,
          #e7dfd0 100%);

      box-shadow:
        0 0 0 2px #171717,
        0 0 0 5px rgba(0, 0, 0, 0.28),
        0 6px 14px rgba(0, 0, 0, 0.55),
        inset 0 0 10px rgba(140, 160, 190, 0.08);

      cursor: pointer;
      z-index: 9999;
      pointer-events: auto;
      overflow: hidden;
      transition: box-shadow 0.2s ease, transform 0.08s ease;
      animation: eeriePulse 4s infinite alternate;
    }

    @keyframes eeriePulse {
      0% {
        box-shadow:
          0 0 0 2px #171717,
          0 0 0 5px rgba(0, 0, 0, 0.28),
          0 6px 14px rgba(0, 0, 0, 0.55),
          inset 0 0 8px rgba(140, 160, 190, 0.06);
      }

      100% {
        box-shadow:
          0 0 0 2px #171717,
          0 0 0 5px rgba(0, 0, 0, 0.28),
          0 6px 18px rgba(0, 0, 0, 0.7),
          inset 0 0 12px rgba(140, 160, 190, 0.1);
      }
    }

    .magic-eye::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 9px;
      width: 10px;
      height: 10px;
      background: rgba(255, 253, 248, 0.72);
      border-radius: 50%;
      filter: blur(1.5px);
      pointer-events: none;
      z-index: 2;
    }

    .magic-eye::after {
      content: "";
      position: absolute;
      bottom: 7px;
      right: 9px;
      width: 6px;
      height: 6px;
      background: rgba(255, 255, 250, 0.42);
      border-radius: 50%;
      filter: blur(1px);
      pointer-events: none;
      z-index: 2;
    }

    .eye-pupil {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 14px;
      height: 14px;
      background: radial-gradient(circle at 35% 35%, #101024, #040406 75%);
      border-radius: 50%;
      box-shadow: 0 0 3px rgba(0, 0, 0, 0.8), inset 0 0 1px rgba(255, 255, 220, 0.2);
      transform: translate(-50%, -50%);
      will-change: transform, opacity;
      pointer-events: none;
      transition: transform 0.05s linear, opacity 0.06s ease;
      z-index: 3;
    }

    .eye-pupil::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 4px;
      width: 3px;
      height: 3px;
      background: #ffd2c0;
      border-radius: 50%;
      opacity: 0.7;
      filter: blur(0.4px);
    }

    /* blink closes the whole eye instead of only hiding the iris */
    .magic-eye.blink {
      --eye-blink: 0.12;
    }

    .magic-eye.blink .eye-pupil {
      opacity: 0;
    }

    /* tiny click squish */
    .magic-eye.poke {
      --eye-squish: 0.96;
    }

    .eye-speech {
      position: fixed;
      bottom: 78px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(12, 12, 16, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid #2e3954;
      border-radius: 18px;
      padding: 8px 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #d7e2ff;
      text-shadow: none;
      white-space: normal;
      word-break: keep-all;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.55), 0 0 10px rgba(127, 158, 255, 0.08);
      z-index: 10000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      font-weight: bold;
      letter-spacing: 0.3px;
    }

    .eye-speech.show {
      opacity: 1;
    }

    .eye-speech::before {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 12px;
      height: 12px;
      background: rgba(12, 12, 16, 0.9);
      border-right: 1px solid #2e3954;
      border-bottom: 1px solid #2e3954;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .magic-eye {
        width: 38px;
        height: 30px;
        bottom: 20px;
      }

      .eye-pupil {
        width: 11px;
        height: 11px;
      }

      .eye-speech {
        bottom: 64px;
        font-size: 0.7rem;
        max-width: 200px;
        padding: 6px 10px;
      }
    }

<body>

  <!-- EYE + speech bubble -->
  <div class="magic-eye" id="magicEye" aria-hidden="true">
    <div class="eye-pupil" id="eyePupil"></div>
  </div>
  <div class="eye-speech" id="eyeSpeech"></div>

  <script>
    (function () {
      const PHRASE_LIST = [
        "👁️ watching...",
        "psst... click something",
        "still here?",
        "the void whispers",
        "shh, it's listening",
        "welcome, wanderer",
        "need a secret?",
        "don't blink...",
        "so dark in here",
        "👁️‍🗨️ follow me",
        "time is thin here",
        "what do you seek?",
        "⚡ eerie hum",
        "are you real?",
        "beware the silence"
      ];

      const FAR_AWAY_PHRASES = [
        "stop messing with me",
        "oh, you're back...",
        "where did you go?",
        "lost in the void?",
        "don't sneak up on me",
        "i felt your absence",
        "👁️‍🗨️ you returned",
        "careful with that cursor",
        "the eye sees all",
        "did you get lost?"
      ];

      const CLICK_PHRASES = [
        "don't poke me!",
        "ouch! that tickles",
        "respect the eye",
        "rude!",
        "👁️ i'm watching you",
        "stop that",
        "gentle, please",
        "you dare?",
        "that's sensitive",
        "no touching!"
      ];

      const BLINK_INTERVAL_SEC = 5;
      const SPEAK_INTERVAL_SEC = 12;
      const SPEECH_DURATION_MS = 4000;
      const INTERACTION_PAUSE_MS = 2800;

      const eye = document.getElementById('magicEye');
      const pupil = document.getElementById('eyePupil');
      const speechBubble = document.getElementById('eyeSpeech');

      if (!eye || !pupil || !speechBubble) return;

      let eyeRect = { left: 0, top: 0, width: 0, height: 0, centerX: 0, centerY: 0 };
      let aRadius = 0;
      let bRadius = 0;
      let pupilRadius = 0;
      let lastMouseX = null;
      let lastMouseY = null;

      let speechTimeout = null;
      let blinkTimer = null;
      let speakTimer = null;

      let pointerOutside = false;
      let idleSuppressedUntil = 0;

      function randomFrom(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function suppressIdle(ms = INTERACTION_PAUSE_MS) {
        idleSuppressedUntil = Math.max(idleSuppressedUntil, Date.now() + ms);
      }

      function canIdleSpeak() {
        return Date.now() >= idleSuppressedUntil;
      }

      function updateMetrics() {
        const rect = eye.getBoundingClientRect();
        eyeRect = {
          left: rect.left,
          top: rect.top,
          width: rect.width,
          height: rect.height,
          centerX: rect.left + rect.width / 2,
          centerY: rect.top + rect.height / 2
        };

        const pupilRect = pupil.getBoundingClientRect();
        pupilRadius = pupilRect.width / 2;
        aRadius = Math.max(0, (eyeRect.width / 2) - pupilRadius);
        bRadius = Math.max(0, (eyeRect.height / 2) - pupilRadius);
      }

      function resetPupilCenter() {
        pupil.style.transform = 'translate(-50%, -50%)';
      }

      function movePupil(mouseX, mouseY) {
        if (aRadius <= 0 || bRadius <= 0) return;

        let dx = mouseX - eyeRect.centerX;
        let dy = mouseY - eyeRect.centerY;

        const normX = dx / aRadius;
        const normY = dy / bRadius;
        const distSq = normX * normX + normY * normY;

        if (distSq > 1 && distSq > 0.01) {
          const scale = 1 / Math.sqrt(distSq);
          dx *= scale;
          dy *= scale;
        }

        pupil.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      }

      function onPointerMove(clientX, clientY) {
        lastMouseX = clientX;
        lastMouseY = clientY;
        movePupil(clientX, clientY);
      }

      function onMouseMove(e) {
        onPointerMove(e.clientX, e.clientY);
      }

      function onTouchMove(e) {
        if (e.touches.length) {
          onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
        }
      }

      function onTouchEnd() {
        resetPupilCenter();
        lastMouseX = null;
        lastMouseY = null;
      }

      function onDocumentMouseOut(e) {
        if (!e.relatedTarget && !e.toElement) {
          pointerOutside = true;
          window._mouseOutside = true;
          resetPupilCenter();
          suppressIdle(1200);
          // no speech here
        }
      }

      function onDocumentMouseOver(e) {
        // only trigger if coming from outside the window
        if (pointerOutside && !e.relatedTarget) {
          pointerOutside = false;
          window._mouseOutside = false;
          suppressIdle(2500);
          showSpeech(randomFrom(FAR_AWAY_PHRASES));
        }
      }

      function onWindowBlur() {
        pointerOutside = true;
        window._mouseOutside = true;
        resetPupilCenter();
        suppressIdle(1200);
      }

      function showSpeech(text) {
        speechBubble.textContent = text;
        speechBubble.classList.add('show');

        if (speechTimeout) clearTimeout(speechTimeout);
        speechTimeout = setTimeout(() => {
          speechBubble.classList.remove('show');
          speechTimeout = null;
        }, SPEECH_DURATION_MS);
      }

      function speakRandom() {
        showSpeech(randomFrom(PHRASE_LIST));
      }

      function blink() {
        eye.classList.add('blink');
        setTimeout(() => {
          eye.classList.remove('blink');
        }, 180);
      }

      function scheduleBlink() {
        if (blinkTimer) clearTimeout(blinkTimer);
        const delay = (BLINK_INTERVAL_SEC + (Math.random() * 3 - 1)) * 1000;
        blinkTimer = setTimeout(() => {
          blink();
          scheduleBlink();
        }, Math.max(2000, delay));
      }

      function scheduleSpeak() {
        if (speakTimer) clearTimeout(speakTimer);
        const delay = (SPEAK_INTERVAL_SEC + Math.random() * 10) * 1000;

        speakTimer = setTimeout(() => {
          if (canIdleSpeak()) {
            speakRandom();
          }
          scheduleSpeak();
        }, Math.max(5000, delay));
      }

      function onEyeClick(e) {
        e.stopPropagation();
        suppressIdle(3500);
        showSpeech(randomFrom(CLICK_PHRASES));

        eye.classList.add('poke');
        setTimeout(() => {
          eye.classList.remove('poke');
        }, 120);
      }

      function onEyePointerEnter() {
        suppressIdle(1000);
      }

      function handleResize() {
        updateMetrics();
        resetPupilCenter();

        if (
          lastMouseX !== null &&
          lastMouseY !== null &&
          lastMouseX >= 0 && lastMouseX <= window.innerWidth &&
          lastMouseY >= 0 && lastMouseY <= window.innerHeight
        ) {
          movePupil(lastMouseX, lastMouseY);
        } else {
          lastMouseX = null;
          lastMouseY = null;
        }
      }

      function init() {
        updateMetrics();
        resetPupilCenter();

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('touchmove', onTouchMove, { passive: true });
        window.addEventListener('touchend', onTouchEnd);
        window.addEventListener('touchcancel', onTouchEnd);

        document.addEventListener('mouseout', onDocumentMouseOut);
        document.addEventListener('mouseover', onDocumentMouseOver);
        window.addEventListener('blur', onWindowBlur);

        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', handleResize);
        window.addEventListener('scroll', () => {
          updateMetrics();
          if (lastMouseX !== null && lastMouseY !== null) {
            movePupil(lastMouseX, lastMouseY);
          }
        }, { passive: true });

        eye.addEventListener('click', onEyeClick);
        eye.addEventListener('pointerenter', onEyePointerEnter);

        window._mouseOutside = false;
        scheduleBlink();
        scheduleSpeak();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
